name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Build
        run: mkdocs build

      - name: Copy functions
        run: cp -r functions site/functions 2>/dev/null || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 2916b691e8628f372cee606674c6959f
          command: pages deploy site --project-name=absolem --branch=main
